<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ND - Creative Hub</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=JetBrains+Mono&display=swap');

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background-color: #ffffff;
            background-image: 
                linear-gradient(#e5e7eb 1px, transparent 1px),
                linear-gradient(90deg, #e5e7eb 1px, transparent 1px);
            background-size: 25px 25px; /* Grid diperkecil agar lebih halus */
            background-attachment: fixed;
            font-family: 'Inter', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 15px;
        }

        .header-logo {
            font-size: 38px;
            font-weight: 900;
            letter-spacing: -2px;
            border: 3px solid #000;
            padding: 5px 15px;
            background: #fff;
            margin-bottom: 40px;
        }

        .preset-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            width: 100%;
            max-width: 850px;
        }

        .preset-card {
            background: #ffffff;
            border: 2px solid #000;
            padding: 15px;
            position: relative;
            display: flex;
            flex-direction: column;
        }

        /* UKURAN FOTO DIPERKECIL */
        .preview-box {
            width: 100%;
            height: 100px; /* Diperkecil agar proporsional */
            background: #f3f4f6;
            border: 1px solid #000;
            overflow: hidden;
            cursor: zoom-in;
            margin-bottom: 10px;
        }

        .preview-box img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: 0.3s;
        }

        /* TEKS SAMPING SEKARANG MENYAMPING (HORIZONTAL) */
        .side-info {
            border: 1px solid #000;
            padding: 5px;
            font-family: 'JetBrains Mono';
            font-size: 10px;
            background: #f9fafb;
            text-align: center;
            margin-bottom: 10px;
            display: flex;
            justify-content: center;
            gap: 10px; /* Teks berjejer ke samping */
        }

        .preset-title {
            font-size: 14px;
            font-weight: 900;
            text-transform: uppercase;
            margin-bottom: 4px;
        }

        .preset-desc {
            font-size: 10px;
            color: #64748b;
            margin-bottom: 12px;
            line-height: 1.3;
        }

        .button-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }

        .btn {
            position: relative;
            text-decoration: none;
            text-align: center;
            padding: 8px;
            font-size: 10px;
            font-weight: 900;
            border: 1.5px solid #000;
            text-transform: uppercase;
            cursor: pointer;
            overflow: hidden;
        }

        .btn-xml { background: #000; color: #fff; }
        .btn-5mb { background: #fff; color: #000; }

        .loading-line {
            position: absolute;
            bottom: 0;
            left: -100%;
            width: 100%;
            height: 3px;
            background: #FFA500;
        }

        .btn.active .loading-line {
            left: 100%;
            transition: 1.2s linear;
        }

        /* FOOTER */
        .footer {
            margin-top: 60px;
            padding: 20px;
            width: 100%;
            border-top: 2px solid #000;
            text-align: center;
            font-family: 'JetBrains Mono';
            font-size: 11px;
            font-weight: bold;
        }

        /* MODAL ZOOM GAMBAR */
        #zoom-modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            z-index: 999;
            justify-content: center;
            align-items: center;
            cursor: zoom-out;
        }

        #zoom-modal img {
            max-width: 90% ;
            max-height: 80% ;
            border: 3px solid #fff;
        }

        @media (max-width: 600px) {
            .preset-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <div class="header-logo">ND</div>

    <div class="preset-grid">
        <div class="preset-card">
            <div class="preview-box" onclick="zoomImg(this)">
                <img src="https://i.ibb.co/C3zHsW2Z/1778377132726.jpg" alt="Preview">
            </div>

            <div class="side-info">
                <span>PRESET</span> | <span>NEW!</span> | <span>2026</span>
            </div>

            <div class="preset-title">By nath</div>
            <p class="preset-desc">Gunakan preset ini dengan import, pilih metode di bawah ini!</p>

            <div class="button-row">
                <div class="btn btn-xml" onclick="handleLink(this, '#')">Xml <div class="loading-line"></div></div>
                <div class="btn btn-5mb" onclick="handleLink(this, 'https://alightcreative.com/am/share/u/JawQREU357QvWmTWk2HFOIa7HiD3/p/8mp6nsoqA9-adc5693cc338566a?source=link')">5MB <div class="loading-line"></div></div>
            </div>
        </div>

        <div class="preset-card">
            <div class="preview-box" onclick="zoomImg(this)">
                <img src="https://via.placeholder.com/400x200" alt="Coming soon">
            </div>

            <div class="side-info">
                <span>COMING</span> | <span>SOON</span> | <span>2026</span>
            </div>

            <div class="preset-title">BELUM TERSEDIA.</div>
            <p class="preset-desc">BELUM TERSEDIA.</p>

            <div class="button-row">
                <div class="btn btn-xml" onclick="handleLink(this, '#')">Xml <div class="loading-line"></div></div>
                <div class="btn btn-5mb" onclick="handleLink(this, '#')">5MB <div class="loading-line"></div></div>
            </div>
        </div>
    </div>

    <div id="zoom-modal" onclick="this.style.display='none'">
        <img id="modal-img" src="" alt="Full View">
    </div>

    <footer class="footer">
        Create By gemini & Nath creator
    </footer>

    <script>
        // Fungsi Zoom
        function zoomImg(el) {
            const modal = document.getElementById('zoom-modal');
            const modalImg = document.getElementById('modal-img');
            modal.style.display = 'flex';
            modalImg.src = el.querySelector('img').src;
        }

        // Fungsi Loading & Link
        function handleLink(element, url) {
            element.classList.add('active');
            setTimeout(() => {
                if(url !== '#') { window.location.href = url; }
                else { 
                    alert("Metode tersebut belum tersedia"); 
                    element.classList.remove('active');
                }
            }, 1200);
        }
    </script>
</body>
</html>
